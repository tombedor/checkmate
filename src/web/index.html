<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkmate Study</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">Checkmate</p>
      <h1>Study Board</h1>
    </div>
    <div class="stats" id="stats">
      <span>Challenge <strong id="stat-current">1</strong>/<strong id="stat-total">0</strong></span>
      <span>Streak <strong id="stat-streak">0</strong></span>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <section class="panel">
        <h2>Lichess Puzzle Focus</h2>
        <div id="focus-list" class="focus-list"></div>
      </section>

      <section class="panel">
        <h2>Weakness Summary</h2>
        <div id="concept-list"></div>
      </section>
    </aside>

    <main class="main">
      <div id="empty-state" class="empty-state" hidden>
        <h2>All caught up</h2>
        <p>No challenges available. Run the pipeline to generate more.</p>
      </div>

      <section id="challenge-shell">
        <div class="challenge-header">
          <span class="concept-badge" id="concept-badge">concept</span>
          <span class="progress-text" id="progress-text">1 / 1</span>
        </div>

        <div class="board-wrap">
          <div id="board" class="board" aria-label="Chess board"></div>
        </div>

        <section class="panel context-box">
          <div class="context-topline">
            <h3>Position Context</h3>
            <a id="game-link" class="game-link" href="#" target="_blank" rel="noreferrer">Open Game</a>
          </div>
          <p id="context-text"></p>
          <p class="instruction" id="instruction-text">Find the best move.</p>
        </section>

        <div class="btn-row">
          <button id="btn-submit" class="btn btn-primary">Submit Move</button>
          <button id="btn-next" class="btn btn-secondary" hidden>Next Challenge</button>
        </div>

        <section class="feedback-box" id="feedback-box" hidden>
          <h3 id="feedback-title"></h3>
          <p id="feedback-explanation"></p>
          <p class="move-comparison" id="move-comparison"></p>
        </section>
      </section>
    </main>
  </div>

  <script src="https://unpkg.com/chess.js@0.10.3/chess.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
